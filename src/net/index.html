<!doctype html>
<html>
    <head>
        <title>Server Synced Clock</title>
        <style>
            body {
                font-family: monospace;
                display: flex;
                flex-direction: column;
                justify-content: left;
                align-items: start;
                height: 100vh;
                background: #111;
                color: white;
                margin: 0;
                padding-left: 10em;
            }
            #clock {
                font-size: 1rem;
            }
        </style>
    </head>
    <body>
        <div id="clock">00:00:00.000</div>
        <button id="LTC-Toggle" onclick="window.pause_play_LTC_timecodes()">
            enable LTC
        </button>
        <div id="info"></div>
        <script src="static/index.js"></script>
    </body>
</html>
